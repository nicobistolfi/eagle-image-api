name: Deploy & Test Production

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-west-1
  ECR_REPO_NAME: image-api-prod
  STACK_NAME: image-api-prod

jobs:
  ci:
    name: Build & Check
    uses: ./.github/workflows/ci.yml

  deploy:
    name: deploy
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPO_NAME 2>/dev/null || \
          aws ecr create-repository --repository-name $ECR_REPO_NAME --image-scanning-configuration scanOnPush=true

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPO_NAME:latest .
          docker push $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_NAME:latest

      - name: Load environment variables
        run: |
          echo "${{ vars.ENV }}" >> $GITHUB_ENV

      - name: Deploy CloudFormation stack
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws cloudformation deploy \
            --template-file template.yml \
            --stack-name $STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Stage=prod \
              ImageUri=$ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG \
              Environment="${ENVIRONMENT:-production}" \
              ApiEndpoint="${API_ENDPOINT:-/api/v1/image}" \
              Quality="${QUALITY:-80}" \
              Fit="${FIT:-outside}" \
              LogLevel="${LOG_LEVEL:-info}" \
              OriginWhitelist="${ORIGIN_WHITELIST:-*}" \
              RedirectOnError="${REDIRECT_ON_ERROR:-false}" \
              WebP="${WEBP:-true}" \
              Avif="${AVIF:-true}" \
              AvifMaxMp="${AVIF_MAX_MP:-2}" \
            --no-fail-on-empty-changeset

      - name: Force API Gateway redeployment
        run: |
          REST_API_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayRestApiId'].OutputValue" \
            --output text)
          aws apigateway create-deployment \
            --rest-api-id $REST_API_ID \
            --stage-name prod

  newman:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - uses: matt-ball/newman-action@master
        with:
          apiKey: ${{ secrets.POSTMAN_API_KEY }}
          collection: ${{ secrets.POSTMAN_COLLECTION_ID }}
          environment: ${{ secrets.POSTMAN_PROD_ENV }}
