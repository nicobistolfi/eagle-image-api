name: Go CI

on:
  workflow_call:

jobs:
  ci:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache libvips
        id: cache-libvips
        uses: actions/cache@v4
        with:
          path: |
            /usr/include/vips
            /usr/lib/x86_64-linux-gnu/libvips*
            /usr/lib/x86_64-linux-gnu/pkgconfig/vips*.pc
          key: libvips-${{ runner.os }}-apt

      - name: Install libvips
        if: steps.cache-libvips.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
